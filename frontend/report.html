<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Report — Cuemath AI Tutor Screener</title>
  <meta name="description" content="Detailed tutor candidate assessment report generated by Cuemath AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="js/theme.js"></script>
  <style>
    .page { position: relative; z-index: 1; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--paper);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo-icon {
      width: 28px; height: 28px;
      color: var(--accent);
    }
    .nav-logo-icon svg { width: 100%; height: 100%; stroke-width: 2px; }
    .nav-text { font-family: var(--font-display); font-size: 1.25rem; color: var(--ink); line-height: 1; margin-bottom: 2px; }
    .nav-sub  { font-size: 0.70rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    /* MAIN LAYOUT */
    main { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

    /* LOADING */
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 20px; text-align: center;
    }
    .spinner {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    /* REPORT CONTENT */
    #report-content { display: none; }

    /* HEADER CARD */
    .report-header {
      padding: 40px; margin-bottom: 24px; text-align: center;
      border-radius: var(--radius-lg); background: var(--paper-warm); border: 1px solid var(--border);
    }
    .report-date { font-size: 0.85rem; color: var(--ink-muted); margin-bottom: 12px; font-weight: 500; font-family: var(--font-body); }
    .report-title { font-size: 1rem; color: var(--ink-soft); margin-top: 8px; font-weight: 500;}
    .report-name { font-family: var(--font-display); font-size: 2.8rem; line-height: 1.1; color: var(--ink); text-transform: capitalize; }

    /* RECOMMENDATION BANNER */
    .rec-banner {
      padding: 24px 32px; border-radius: var(--radius-md); margin-bottom: 32px;
      display: flex; align-items: center; gap: 20px; font-weight: 500; font-size: 1.15rem;
    }
    .rec-banner.pass   { background: rgba(43, 122, 80, 0.05); border: 1px solid rgba(43, 122, 80, 0.2); color: var(--accent-green); box-shadow: 0 4px 12px rgba(43, 122, 80, 0.05); }
    .rec-banner.fail   { background: var(--danger-light);  border: 1px solid rgba(192, 57, 43, 0.2);  color: var(--danger);   box-shadow: 0 4px 12px rgba(192, 57, 43, 0.05); }
    .rec-banner.maybe  { background: rgba(184, 115, 51, 0.05); border: 1px solid rgba(184, 115, 51, 0.2); color: var(--accent-amber); box-shadow: 0 4px 12px rgba(184, 115, 51, 0.05); }
    .rec-icon { width: 32px; height: 32px; }
    .rec-icon svg { width: 100%; height: 100%; stroke-width: 2px; }
    .rec-text { display: flex; flex-direction: column; gap: 4px; }
    .rec-label { font-size: 0.75rem; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); }

    /* SCORE + SUMMARY ROW */
    .score-summary-row {
      display: grid; grid-template-columns: 200px 1fr; gap: 24px; margin-bottom: 32px;
    }
    .score-card {
      padding: 32px 20px; text-align: center;
    }
    .score-ring {
      position: relative; width: 100px; height: 100px; margin: 0 auto 16px;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--border-soft); stroke-width: 6; }
    .score-ring-fill {
      fill: none; stroke-width: 6; stroke-linecap: round;
      stroke: var(--ink);
      stroke-dasharray: 283; stroke-dashoffset: 283;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    .score-number {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: var(--font-display); font-size: 2.2rem; line-height: 1; color: var(--ink);
    }
    .score-label { font-size: 0.85rem; color: var(--ink-muted); font-weight: 500; }

    .summary-card { padding: 32px; }
    .summary-card h3 { margin-bottom: 12px; color: var(--ink-soft); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .summary-card p { font-size: 1.05rem; color: var(--ink); line-height: 1.7; }

    /* DIMENSIONS */
    .dimensions-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px;
    }
    .dimensions-grid .dim-card:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }
    .dim-card { padding: 28px 32px; }
    .dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .dim-name { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: var(--ink); }
    .dim-icon { width: 20px; height: 20px; color: var(--ink-soft); }
    .dim-icon svg { width: 100%; height: 100%; stroke-width: 1.5px; }
    .dim-score-badge {
      font-size: 1rem; font-family: var(--font-display); min-width: 44px;
      padding: 4px 12px; border-radius: var(--radius-full);
      text-align: center;
    }
    .score-high  { background: rgba(43, 122, 80, 0.1); color: var(--accent-green); }
    .score-mid   { background: rgba(184, 115, 51, 0.1); color: var(--accent-amber); }
    .score-low   { background: var(--danger-light);     color: var(--danger);   }
    .dim-bar-wrap {
      height: 4px; background: var(--border-soft); border-radius: var(--radius-full); overflow: hidden; margin-bottom: 16px;
    }
    .dim-bar-fill {
      height: 100%; border-radius: var(--radius-full); width: 0;
      transition: width 1.2s cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    .bar-high  { background: var(--accent-green); }
    .bar-mid   { background: var(--accent-amber); }
    .bar-low   { background: var(--danger); }
    .dim-justification { font-size: 0.95rem; color: var(--ink-soft); margin-bottom: 16px; line-height: 1.6; }
    .dim-quote {
      font-style: italic; font-size: 0.9rem; color: var(--ink-muted);
      padding: 12px 16px; border-left: 2px solid var(--accent);
      background: var(--paper-warm); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      line-height: 1.5;
    }

    /* TRANSCRIPT */
    .transcript-card { margin-bottom: 32px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--paper-card); overflow: hidden; box-shadow: var(--shadow-card); }
    .transcript-header {
      padding: 24px 32px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      user-select: none; transition: var(--transition);
      background: var(--paper-warm);
    }
    .transcript-header:hover { background: var(--border-soft); }
    .transcript-header span:first-child { font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; gap: 8px;}
    .transcript-body {
      max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    .transcript-body.open { max-height: 800px; overflow-y: auto; }
    .transcript-messages { padding: 8px 32px 32px; display: flex; flex-direction: column; gap: 20px; }
    .t-msg { display: flex; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border-soft);}
    .t-msg:first-child { border-top: none; }
    .t-role {
      font-size: 0.8rem; font-weight: 600; min-width: 72px;
      padding-top: 2px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .t-role.aria { color: var(--accent); }
    .t-role.cand { color: var(--ink-muted); }
    .t-content { font-size: 0.95rem; color: var(--ink); line-height: 1.6; flex: 1; }

    /* ACTIONS */
    .actions-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;}
    .actions-row .btn { padding: 0.85rem 1.5rem; font-size: 1rem; }

    @media print {
      :root {
        --ink: #1a1816;
        --ink-soft: #3d3a36;
        --ink-muted: #6b6357;
        --paper: #ffffff;
        --paper-warm: #f8fafc;
        --paper-card: #ffffff;
        --border: #e2e8f0;
      }
      @page { margin: 18mm 15mm; size: A4; }
      .nav, .actions-row, .transcript-header { display: none !important; }
      body, .page { background: white !important; color: var(--ink) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-size: 11pt; }
      .card, .glass-card, .rec-banner, .dim-card, .report-header, .transcript-card {
        background: #fff !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; break-inside: avoid !important; page-break-inside: avoid !important;
      }
      .font-display { font-family: Georgia, serif !important; }
      .report-name { color: var(--ink) !important; opacity: 1 !important; }
      .report-title { color: var(--ink-soft) !important; }
      .report-date, .score-label, .status-label, .dim-justification, .t-content, .summary-card p, .dim-name { color: var(--ink-soft) !important; }
      .score-number { color: var(--ink) !important; font-weight: 700 !important; font-size: 2.2rem !important; }
      .summary-card h3 { color: var(--ink) !important; }
      .dim-score-badge { border: 1px solid rgba(0,0,0,0.1) !important; font-weight: 700 !important; }
      .dim-icon { color: var(--ink-soft) !important; }
      .dim-quote { color: var(--ink-muted) !important; border-left-color: var(--accent) !important; background: #f8fafc !important; }
      .t-role.aria { color: var(--accent) !important; }
      .t-role.cand { color: var(--ink-muted) !important; }
      .rec-banner.pass  { background: #f0fdf4 !important; border-color: #86efac !important; color: #166534 !important; }
      .rec-banner.fail  { background: #fef2f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; }
      .rec-banner.maybe { background: #fffbeb !important; border-color: #fcd34d !important; color: #92400e !important; }
      .score-high { background: #f0fdf4 !important; color: #166534 !important; }
      .score-mid  { background: #fffbeb !important; color: #92400e !important; }
      .score-low  { background: #fef2f2 !important; color: #991b1b !important; }
      .bar-high { background: #22c55e !important; }
      .bar-mid  { background: #f59e0b !important; }
      .bar-low  { background: #ef4444 !important; }
      .dim-bar-wrap { background: #e5e7eb !important; }
      main { max-width: 100% !important; padding: 0 !important; }
      .score-summary-row { grid-template-columns: 160px 1fr !important; }
      .report-header, .rec-banner { break-after: avoid; page-break-after: avoid; }
      .transcript-card { break-inside: auto; page-break-inside: auto; border: none !important; }
      .transcript-body { max-height: none !important; overflow: visible !important; display: block !important; padding-top: 20px;}
      .transcript-header { display: flex !important; cursor: default; }
      #transcript-toggle-icon { display: none !important; }
      .t-msg { break-inside: avoid; page-break-inside: avoid; }
      .dimensions-grid { grid-template-columns: 1fr 1fr !important; }
    }

    @media (max-width: 640px) {
      .dimensions-grid { grid-template-columns: 1fr; }
      .score-summary-row { grid-template-columns: 1fr; gap: 16px; }
      .nav { padding: 14px 20px; }
      .report-header { padding: 32px 20px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5M12 19v3M8 22h8"/></svg>
      </div>
      <div>
        <div class="nav-text">Cuemath</div>
        <div class="nav-sub">AI Tutor Screener</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="dashboard.html" class="btn btn-ghost" style="padding:8px 16px">
        <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;margin-right:-4px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Dashboard
      </a>
      <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
        <svg viewBox="0 0 24 24" fill="none" class="icon theme-toggle-icon"></svg>
      </button>
    </div>
  </nav>

  <main>
    <!-- LOADING -->
    <div id="loading">
      <div class="spinner"></div>
      <h2 class="font-display">Loading Report…</h2>
      <p style="color:var(--ink-soft)">Please wait while we fetch the assessment.</p>
    </div>

    <!-- REPORT -->
    <div id="report-content">

      <!-- Header -->
      <div class="report-header animate-fadeIn">
        <div class="report-date" id="report-date">—</div>
        <div class="report-name" id="report-name">—</div>
        <div class="report-title">Tutor Assessment Report</div>
      </div>

      <!-- Recommendation -->
      <div class="card rec-banner" id="rec-banner">
        <div class="rec-icon" id="rec-icon"></div>
        <div class="rec-text">
          <span class="rec-label">Recommendation</span>
          <span id="rec-text" class="font-display" style="font-size:1.4rem">—</span>
        </div>
      </div>

      <!-- Score + Summary -->
      <div class="score-summary-row">
        <div class="card score-card">
          <div class="score-ring">
            <svg width="100" height="100" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="score-ring-bg"/>
              <circle cx="50" cy="50" r="45" class="score-ring-fill" id="score-ring-fill"/>
            </svg>
            <div class="score-number" id="score-number">—</div>
          </div>
          <div class="score-label">Overall Score</div>
        </div>
        <div class="card summary-card">
          <h3>Summary</h3>
          <p id="summary-text">—</p>
        </div>
      </div>

      <!-- Dimensions -->
      <div class="dimensions-grid" id="dimensions-grid">
        <!-- Injected by JS -->
      </div>

      <!-- Transcript -->
      <div class="transcript-card">
        <div class="transcript-header" onclick="toggleTranscript()">
          <span>
            <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:18px;height:18px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Full Transcript
          </span>
          <span id="transcript-toggle-icon" style="color:var(--ink-muted); font-size:0.85rem; font-weight:500;">
             <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><polyline points="6 9 12 15 18 9"/></svg> 
             Expand
          </span>
        </div>
        <div class="transcript-body" id="transcript-body">
          <div class="transcript-messages" id="transcript-messages">
            <!-- Injected by JS -->
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions-row">
        <button class="btn btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Report
        </button>
        <button class="btn btn-ghost" onclick="copyLink()">
          <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Copy Link
        </button>
        <a href="index.html" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Interview
        </a>
      </div>
    </div>
  </main>
</div>

<script>
const DIMENSION_META = {
  communication_clarity: { label: 'Communication Clarity', icon: '<svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' },
  warmth_and_patience:   { label: 'Warmth & Patience',     icon: '<svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' },
  ability_to_simplify:   { label: 'Ability to Simplify',   icon: '<svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M19.439 7.85c-.049.322.059.648.289.878l1.568 1.568c.47.47.706 1.087.706 1.704s-.235 1.233-.706 1.704l-1.611 1.611a.98.98 0 0 0-.253 1.024v.001c.219.684.093 1.453-.352 2.029-.444.576-1.157.868-1.854.764h-.001a1.002 1.002 0 0 0-1.009.288l-1.568 1.568c-.47.47-1.087.706-1.704.706s-1.233-.235-1.704-.706l-1.611-1.611a.98.98 0 0 0-1.023-.254v-.001c-.684.22-1.454.093-2.029-.352-.576-.444-.868-1.158-.764-1.855h.001A1 1 0 0 0 4.52 14.96L2.952 13.39c-.47-.47-.706-1.087-.706-1.704s.235-1.233.706-1.704l1.611-1.611a.98.98 0 0 0 .253-1.023v-.001c-.22-.684-.094-1.454.352-2.029.444-.576 1.158-.868 1.854-.764h.001a1.002 1.002 0 0 0 1.009-.288l1.568-1.568c.47-.47 1.087-.706 1.704-.706s1.233.235 1.704.706l1.611 1.611a.98.98 0 0 0 1.023.254v.001c.684-.22 1.454-.093 2.029.352.576.444.868 1.157.764 1.854h-.001c-.024.16.035.334.137.458Z"/><circle cx="12" cy="12" r="3"/></svg>' },
  english_fluency:       { label: 'English Fluency',       icon: '<svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 2v20M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>' },
  candidate_fit:         { label: 'Candidate Fit',          icon: '<svg viewBox="0 0 24 24" fill="none" class="icon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' },
};

function getSessionId() {
  return new URLSearchParams(window.location.search).get('session_id');
}

function scoreClass(score) {
  if (score >= 7) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

async function loadReport() {
  const sid = getSessionId();
  if (!sid) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">No session ID in URL.</p>';
    return;
  }

  // Poll until ready
  const maxAttempts = 20;
  let attempts = 0;
  while (attempts < maxAttempts) {
    try {
      const res = await fetch(`/api/session/report/${sid}`);
      const data = await res.json();
      if (data.status === 'ready') {
        renderReport(data.report, sid);
        return;
      }
    } catch (e) { console.error(e); }
    attempts++;
    await new Promise(r => setTimeout(r, 3000));
  }

  document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Report could not be loaded. Please try refreshing.</p>';
}

async function renderReport(report, sessionId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('report-content').style.display = 'block';

  // Header
  document.getElementById('report-name').textContent = report.candidate_name;
  document.getElementById('report-date').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // Recommendation banner
  const banner = document.getElementById('rec-banner');
  const rec = report.recommendation;
  const checkIcon = '<svg viewBox="0 0 24 24" fill="none" class="icon"><polyline points="20 6 9 17 4 12"/></svg>';
  const errorIcon = '<svg viewBox="0 0 24 24" fill="none" class="icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  const warningIcon = '<svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

  if (rec === 'Move to next round') {
    banner.classList.add('pass');
    document.getElementById('rec-icon').innerHTML = checkIcon;
  } else if (rec === 'Do not move forward') {
    banner.classList.add('fail');
    document.getElementById('rec-icon').innerHTML = errorIcon;
  } else {
    banner.classList.add('maybe');
    document.getElementById('rec-icon').innerHTML = warningIcon;
  }
  document.getElementById('rec-text').textContent = rec;

  // Score ring
  document.getElementById('score-number').textContent = report.overall_score;
  const pct = report.overall_score / 10;
  const circumference = 2 * Math.PI * 45; // ~283
  setTimeout(() => {
    document.getElementById('score-ring-fill').style.strokeDashoffset =
      circumference * (1 - pct);
  }, 200);

  // Summary
  document.getElementById('summary-text').textContent = report.summary;

  // Dimensions
  const grid = document.getElementById('dimensions-grid');
  grid.innerHTML = '';
  for (const [key, meta] of Object.entries(DIMENSION_META)) {
    const dim = report.dimensions[key];
    if (!dim) continue;
    const sc = scoreClass(dim.score);

    const card = document.createElement('div');
    card.className = 'card dim-card animate-fadeIn';
    card.innerHTML = `
      <div class="dim-header">
        <div class="dim-name"><div class="dim-icon">${meta.icon}</div>${meta.label}</div>
        <div class="dim-score-badge score-${sc}">${dim.score}/10</div>
      </div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-fill bar-${sc}" id="bar-${key}" style="width:0%"></div>
      </div>
      <div class="dim-justification">${dim.justification}</div>
      <div class="dim-quote">${dim.quote}</div>
    `;
    grid.appendChild(card);

    // Animate bar after paint
    setTimeout(() => {
      const bar = document.getElementById(`bar-${key}`);
      if (bar) bar.style.width = `${dim.score * 10}%`;
    }, 300);
  }

  // Transcript
  try {
    const tRes = await fetch(`/api/session/history/${sessionId}`);
    const tData = await tRes.json();
    const msgs = document.getElementById('transcript-messages');
    msgs.innerHTML = '';
    for (const msg of tData.messages) {
      const isAria = msg.role === 'interviewer';
      const div = document.createElement('div');
      div.className = 't-msg';
      div.innerHTML = `
        <div class="t-role ${isAria ? 'aria' : 'cand'}">${isAria ? 'Sarah' : 'Candidate'}</div>
        <div class="t-content">${escapeHtml(msg.content)}</div>
      `;
      msgs.appendChild(div);
    }
  } catch (e) { console.error('Transcript load failed:', e); }
}

function toggleTranscript() {
  const body = document.getElementById('transcript-body');
  const icon = document.getElementById('transcript-toggle-icon');
  const isOpen = body.classList.toggle('open');
  icon.innerHTML = isOpen 
    ? '<svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><polyline points="18 15 12 9 6 15"/></svg> Collapse' 
    : '<svg viewBox="0 0 24 24" fill="none" class="icon" style="width:16px;height:16px;"><polyline points="6 9 12 15 18 9"/></svg> Expand';
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    alert('Report link copied!');
  });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadReport();
</script>
</body>
</html>

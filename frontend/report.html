<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Report — Cuemath AI Tutor Screener</title>
  <meta name="description" content="Detailed tutor candidate assessment report generated by Cuemath AI." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <style>
    .page { position: relative; z-index: 1; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px; border-bottom: 1px solid var(--border-glass);
      background: rgba(8,8,16,0.8); backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo-dot {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .nav-text { font-weight: 700; font-size: 1rem; }
    .nav-sub  { font-size: 0.75rem; color: var(--text-muted); }

    /* MAIN LAYOUT */
    main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    /* LOADING */
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 20px; text-align: center;
    }
    .spinner {
      width: 50px; height: 50px; border-radius: 50%;
      border: 3px solid rgba(124,58,237,0.2);
      border-top: 3px solid var(--accent-light);
      animation: spin 1s linear infinite;
    }

    /* REPORT CONTENT */
    #report-content { display: none; }

    /* HEADER CARD */
    .report-header {
      padding: 36px 40px; margin-bottom: 24px; text-align: center;
    }
    .report-date { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 8px; }
    .report-title { font-size: 0.9rem; color: var(--text-secondary); margin-top: 6px; }
    .report-name { font-size: 2rem; font-weight: 800; text-transform: capitalize; }

    /* RECOMMENDATION BANNER */
    .rec-banner {
      padding: 20px 28px; border-radius: var(--radius-lg); margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px; font-weight: 700; font-size: 1.1rem;
    }
    .rec-banner.pass   { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--accent-green); box-shadow: var(--shadow-green); }
    .rec-banner.fail   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--accent-red);   box-shadow: var(--shadow-red); }
    .rec-banner.maybe  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--accent-amber); box-shadow: var(--shadow-amber); }
    .rec-icon { font-size: 1.8rem; }
    .rec-text { display: flex; flex-direction: column; gap: 2px; }
    .rec-label { font-size: 0.75rem; font-weight: 500; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }

    /* SCORE + SUMMARY ROW */
    .score-summary-row {
      display: grid; grid-template-columns: 180px 1fr; gap: 20px; margin-bottom: 24px;
    }
    .score-card {
      padding: 28px 20px; text-align: center;
    }
    .score-ring {
      position: relative; width: 100px; height: 100px; margin: 0 auto 12px;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 8; }
    .score-ring-fill {
      fill: none; stroke-width: 8; stroke-linecap: round;
      stroke: url(#scoreGradient);
      stroke-dasharray: 283; stroke-dashoffset: 283;
      transition: stroke-dashoffset 1.5s ease;
    }
    .score-number {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 1.8rem; font-weight: 900; color: var(--text-primary);
    }
    .score-label { font-size: 0.8rem; color: var(--text-muted); }

    .summary-card { padding: 28px; }
    .summary-card h3 { margin-bottom: 12px; color: var(--text-secondary); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .summary-card p { font-size: 0.95rem; color: var(--text-primary); line-height: 1.7; }

    /* DIMENSIONS */
    .dimensions-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
    }
    /* Last card spans full width if it's alone on its row (odd number of cards) */
    .dimensions-grid .dim-card:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }
    .dim-card { padding: 22px 24px; }
    .dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dim-name { font-size: 0.92rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .dim-icon { font-size: 1rem; }
    .dim-score-badge {
      font-size: 1rem; font-weight: 700; min-width: 40px;
      padding: 2px 10px; border-radius: var(--radius-full);
      text-align: center;
    }
    .score-high  { background: rgba(16,185,129,0.15); color: var(--accent-green); }
    .score-mid   { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
    .score-low   { background: rgba(239,68,68,0.15);  color: var(--accent-red);   }
    .dim-bar-wrap {
      height: 6px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; margin-bottom: 12px;
    }
    .dim-bar-fill {
      height: 100%; border-radius: 10px; width: 0;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bar-high  { background: linear-gradient(90deg, #10b981, #34d399); }
    .bar-mid   { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bar-low   { background: linear-gradient(90deg, #ef4444, #f87171); }
    .dim-justification { font-size: 0.83rem; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
    .dim-quote {
      font-style: italic; font-size: 0.82rem; color: var(--text-muted);
      padding: 8px 12px; border-left: 2px solid var(--accent-primary);
      background: rgba(124,58,237,0.05); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .dim-quote::before { content: '"'; }
    .dim-quote::after  { content: '"'; }

    /* TRANSCRIPT */
    .transcript-card { margin-bottom: 24px; }
    .transcript-header {
      padding: 20px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      user-select: none; border-radius: var(--radius-lg);
      transition: var(--transition);
    }
    .transcript-header:hover { background: var(--bg-glass-hover); }
    .transcript-body {
      max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
    }
    .transcript-body.open { max-height: 600px; overflow-y: auto; }
    .transcript-messages { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 16px; }
    .t-msg { display: flex; gap: 12px; }
    .t-role {
      font-size: 0.78rem; font-weight: 600; min-width: 60px;
      padding-top: 2px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .t-role.aria { color: var(--accent-light); }
    .t-role.cand { color: var(--text-muted); }
    .t-content { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.55; }

    /* ACTIONS */
    .actions-row { display: flex; gap: 12px; flex-wrap: wrap; }

    @media print {
      /* --- Page setup --- */
      @page {
        margin: 18mm 15mm;
        size: A4;
      }

      /* --- Hide UI chrome --- */
      .nav,
      .actions-row,
      .transcript-header { display: none !important; }

      /* --- Reset backgrounds for print (ink saving + legibility) --- */
      body, .page {
        background: white !important;
        color: #111 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* --- Cards: white bg, light border, NO cut in middle --- */
      .glass-card, .rec-banner, .dim-card {
        background: #fff !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* --- Gradient text falls back to solid purple --- */
      .gradient-text {
        background: none !important;
        -webkit-background-clip: unset !important;
        -webkit-text-fill-color: #7c3aed !important;
        color: #7c3aed !important;
      }

      .report-date, .score-label, .status-label,
      .dim-justification, .t-content, .summary-card p {
        color: #334155 !important;
      }
      .score-number {
        color: #1e293b !important;
        font-weight: 950 !important;
        font-size: 2.2rem !important;
      }
      .summary-card h3 {
        color: #0f172a !important;
        font-weight: 800 !important;
      }
      .dim-score-badge {
        font-weight: 900 !important;
        border: 1px solid rgba(0,0,0,0.1) !important;
      }
      .dim-quote {
        color: #334155 !important;
        border-left-color: #7c3aed !important;
        background: #f5f3ff !important;
      }
      .t-role.aria { color: #7c3aed !important; font-weight: 700 !important; }
      .t-role.cand { color: #334155 !important; font-weight: 700 !important; }

      /* --- Recommendation banner colours on print --- */
      .rec-banner.pass  { background: #f0fdf4 !important; border-color: #86efac !important; color: #166534 !important; }
      .rec-banner.fail  { background: #fef2f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; }
      .rec-banner.maybe { background: #fffbeb !important; border-color: #fcd34d !important; color: #92400e !important; }

      /* --- Score badge colours on print --- */
      .score-high { background: #f0fdf4 !important; color: #166534 !important; }
      .score-mid  { background: #fffbeb !important; color: #92400e !important; }
      .score-low  { background: #fef2f2 !important; color: #991b1b !important; }

      /* --- Score bar colours on print --- */
      .bar-high { background: #22c55e !important; }
      .bar-mid  { background: #f59e0b !important; }
      .bar-low  { background: #ef4444 !important; }
      .dim-bar-wrap { background: #e5e7eb !important; }

      /* --- Layout: single-column on print feels cleaner --- */
      main { max-width: 100% !important; padding: 0 !important; }
      .score-summary-row { grid-template-columns: 140px 1fr !important; }

      /* --- Prevent orphaned header/rec banner --- */
      .report-header, .rec-banner { break-after: avoid; page-break-after: avoid; }

      /* --- Transcript: always visible in print, no max-height --- */
      .transcript-card { break-inside: auto; page-break-inside: auto; }
      .transcript-body {
        max-height: none !important;
        overflow: visible !important;
        display: block !important;
      }
      .transcript-header { display: flex !important; cursor: default; }
      #transcript-toggle-icon { display: none !important; }

      /* --- Keep each transcript message together --- */
      .t-msg { break-inside: avoid; page-break-inside: avoid; }

      /* --- Dimensions grid stays 2-col --- */
      .dimensions-grid { grid-template-columns: 1fr 1fr !important; }
    }

    @media (max-width: 640px) {
      .dimensions-grid { grid-template-columns: 1fr; }
      .score-summary-row { grid-template-columns: 1fr; }
      .nav { padding: 14px 20px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo-dot">🎓</div>
      <div>
        <div class="nav-text">Cuemath</div>
        <div class="nav-sub">AI Tutor Screener</div>
      </div>
    </div>
    <a href="dashboard.html" class="btn btn-ghost" style="font-size:0.85rem; padding:8px 16px">← Dashboard</a>
  </nav>

  <main>
    <!-- LOADING -->
    <div id="loading">
      <div class="spinner"></div>
      <h2 class="gradient-text">Loading Report…</h2>
      <p>Please wait while we fetch the assessment.</p>
    </div>

    <!-- REPORT -->
    <div id="report-content">

      <!-- Header -->
      <div class="glass-card report-header animate-fadeIn">
        <div class="report-date" id="report-date">—</div>
        <div class="report-name gradient-text" id="report-name">—</div>
        <div class="report-title">Cuemath Tutor Assessment Report</div>
      </div>

      <!-- Recommendation -->
      <div class="rec-banner" id="rec-banner">
        <div class="rec-icon" id="rec-icon">—</div>
        <div class="rec-text">
          <span class="rec-label">Recommendation</span>
          <span id="rec-text">—</span>
        </div>
      </div>

      <!-- Score + Summary -->
      <div class="score-summary-row">
        <div class="glass-card score-card">
          <div class="score-ring">
            <svg width="100" height="100" viewBox="0 0 100 100">
              <defs>
                <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#7c3aed"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>
              <circle cx="50" cy="50" r="45" class="score-ring-bg"/>
              <circle cx="50" cy="50" r="45" class="score-ring-fill" id="score-ring-fill"/>
            </svg>
            <div class="score-number" id="score-number">—</div>
          </div>
          <div class="score-label">Overall Score</div>
        </div>
        <div class="glass-card summary-card">
          <h3>Summary</h3>
          <p id="summary-text">—</p>
        </div>
      </div>

      <!-- Dimensions -->
      <div class="dimensions-grid" id="dimensions-grid">
        <!-- Injected by JS -->
      </div>

      <!-- Transcript -->
      <div class="glass-card transcript-card">
        <div class="transcript-header" onclick="toggleTranscript()">
          <span style="font-weight:600">📝 Full Transcript</span>
          <span id="transcript-toggle-icon" style="color:var(--text-muted); font-size:0.85rem">▼ Expand</span>
        </div>
        <div class="transcript-body" id="transcript-body">
          <div class="transcript-messages" id="transcript-messages">
            <!-- Injected by JS -->
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions-row">
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print Report</button>
        <button class="btn btn-ghost" onclick="copyLink()">🔗 Copy Link</button>
        <a href="dashboard.html" class="btn btn-ghost">← All Reports</a>
        <a href="index.html" class="btn btn-ghost">+ New Interview</a>
      </div>
    </div>
  </main>
</div>

<script>
const DIMENSION_META = {
  communication_clarity: { label: 'Communication Clarity', icon: '💬' },
  warmth_and_patience:   { label: 'Warmth & Patience',     icon: '💛' },
  ability_to_simplify:   { label: 'Ability to Simplify',   icon: '🧩' },
  english_fluency:       { label: 'English Fluency',       icon: '🗣️' },
  candidate_fit:         { label: 'Candidate Fit',          icon: '⭐' },
};

function getSessionId() {
  return new URLSearchParams(window.location.search).get('session_id');
}

function scoreClass(score) {
  if (score >= 7) return 'high';
  if (score >= 5) return 'mid';
  return 'low';
}

async function loadReport() {
  const sid = getSessionId();
  if (!sid) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--accent-red)">❌ No session ID in URL.</p>';
    return;
  }

  // Poll until ready
  const maxAttempts = 20;
  let attempts = 0;
  while (attempts < maxAttempts) {
    try {
      const res = await fetch(`/api/session/report/${sid}`);
      const data = await res.json();
      if (data.status === 'ready') {
        renderReport(data.report, sid);
        return;
      }
    } catch (e) { console.error(e); }
    attempts++;
    await new Promise(r => setTimeout(r, 3000));
  }

  document.getElementById('loading').innerHTML = '<p style="color:var(--accent-red)">❌ Report could not be loaded. Please try refreshing.</p>';
}

async function renderReport(report, sessionId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('report-content').style.display = 'block';

  // Header
  document.getElementById('report-name').textContent = report.candidate_name;
  document.getElementById('report-date').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // Recommendation banner
  const banner = document.getElementById('rec-banner');
  const rec = report.recommendation;
  if (rec === 'Move to next round') {
    banner.classList.add('pass');
    document.getElementById('rec-icon').textContent = '✅';
  } else if (rec === 'Do not move forward') {
    banner.classList.add('fail');
    document.getElementById('rec-icon').textContent = '❌';
  } else {
    banner.classList.add('maybe');
    document.getElementById('rec-icon').textContent = '⚠️';
  }
  document.getElementById('rec-text').textContent = rec;

  // Score ring
  document.getElementById('score-number').textContent = report.overall_score;
  const pct = report.overall_score / 10;
  const circumference = 2 * Math.PI * 45; // ~283
  setTimeout(() => {
    document.getElementById('score-ring-fill').style.strokeDashoffset =
      circumference * (1 - pct);
  }, 200);

  // Summary
  document.getElementById('summary-text').textContent = report.summary;

  // Dimensions
  const grid = document.getElementById('dimensions-grid');
  grid.innerHTML = '';
  for (const [key, meta] of Object.entries(DIMENSION_META)) {
    const dim = report.dimensions[key];
    if (!dim) continue;
    const sc = scoreClass(dim.score);

    const card = document.createElement('div');
    card.className = 'glass-card dim-card animate-fadeIn';
    card.innerHTML = `
      <div class="dim-header">
        <div class="dim-name"><span class="dim-icon">${meta.icon}</span>${meta.label}</div>
        <div class="dim-score-badge score-${sc}">${dim.score}/10</div>
      </div>
      <div class="dim-bar-wrap">
        <div class="dim-bar-fill bar-${sc}" id="bar-${key}" style="width:0%"></div>
      </div>
      <div class="dim-justification">${dim.justification}</div>
      <div class="dim-quote">${dim.quote}</div>
    `;
    grid.appendChild(card);

    // Animate bar after paint
    setTimeout(() => {
      const bar = document.getElementById(`bar-${key}`);
      if (bar) bar.style.width = `${dim.score * 10}%`;
    }, 300);
  }

  // Transcript
  try {
    const tRes = await fetch(`/api/session/history/${sessionId}`);
    const tData = await tRes.json();
    const msgs = document.getElementById('transcript-messages');
    msgs.innerHTML = '';
    for (const msg of tData.messages) {
      const isAria = msg.role === 'interviewer';
      const div = document.createElement('div');
      div.className = 't-msg';
      div.innerHTML = `
        <div class="t-role ${isAria ? 'aria' : 'cand'}">${isAria ? 'Sarah' : 'Candidate'}</div>
        <div class="t-content">${escapeHtml(msg.content)}</div>
      `;
      msgs.appendChild(div);
    }
  } catch (e) { console.error('Transcript load failed:', e); }
}

function toggleTranscript() {
  const body = document.getElementById('transcript-body');
  const icon = document.getElementById('transcript-toggle-icon');
  const isOpen = body.classList.toggle('open');
  icon.textContent = isOpen ? '▲ Collapse' : '▼ Expand';
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    alert('Report link copied!');
  });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadReport();
</script>
</body>
</html>
